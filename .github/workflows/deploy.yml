name: Deploy na GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages majú zdroj "Deploy from a branch" (gh-pages) — workflow tam
# pushne zostavený web. Netreba pages:write, stačí contents:write.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            extended/package-lock.json

      # v1 (koreň) → site/
      - run: npm ci
      - run: npm run build

      # Extended v2 → site/extended/
      - run: npm ci
        working-directory: extended
      - run: npm test
        working-directory: extended
      - run: npm run build
        working-directory: extended

      - name: Zostav výsledný web
        run: |
          mkdir -p site/extended
          cp -r dist/* site/
          cp -r extended/dist/* site/extended/
          touch site/.nojekyll

      - name: Push na gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
