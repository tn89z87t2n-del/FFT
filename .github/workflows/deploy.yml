name: Deploy na GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages majú zdroj "Deploy from a branch" (gh-pages) — workflow tam
# pushne zostavený web. Netreba pages:write, stačí contents:write.
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            simple/package-lock.json

      # Hlavná verzia (FFT LAB v2, koreň) → site/
      - run: npm ci
      - run: npm test
      - run: npm run build

      # Simple v1 → site/simple/
      - run: npm ci
        working-directory: simple
      - run: npm run build
        working-directory: simple

      - name: Zostav výsledný web
        run: |
          mkdir -p site/simple site/extended
          cp -r dist/* site/
          cp -r simple/dist/* site/simple/
          # presmerovanie starej URL /extended/ na koreň
          cat > site/extended/index.html <<'HTML'
          <!doctype html><html lang="sk"><head><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=../">
          <link rel="canonical" href="../"><title>FFT LAB</title></head>
          <body><p>Stránka sa presunula — <a href="../">pokračuj sem</a>.</p></body></html>
          HTML
          touch site/.nojekyll

      - name: Push na gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
